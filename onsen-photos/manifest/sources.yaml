# onsen-photos マニフェスト(人が手で記入する唯一のファイル)
# スキーマ: manifest/sources.schema.md / 設計書 §3
#
# 使い方:
#   1. 規約に沿って人手で取得(DLボタン/申請)した原本を inbox/<ライブラリー名>/ に置く
#   2. 1画像 = 1エントリで、下の「記入例」に倣ってこのファイルに追記する
#   3. `node scripts/01_validate.mjs` で整合チェック → 02 → 03 → 04 の順に実行
#      (まとめて `npm run all`)。サイト結線データは `npm run site` で生成
#
# トップレベルは「エントリの配列」。現在は空(記入例は下にコメントとして掲載)。
# 実データを追記する際は、この行の下に `- file: ...` を続ける。

[]

